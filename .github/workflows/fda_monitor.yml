name: FDA新药监控

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch: 

# 💡 新增：显式声明权限，确保 GITHUB_TOKEN 拥有写权限
permissions:
  contents: write

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          # 💡 确保使用默认 token 检出
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖库
        run: pip install requests beautifulsoup4 yfinance

      - name: 执行监控脚本
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python fda_monitor.py

      - name: 保存运行记录
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_fda_ids.txt
          # 只有在有变动时才 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新FDA记录" && git push)
