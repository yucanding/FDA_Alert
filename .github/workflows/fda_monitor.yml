name: FDA新药监控

on:
  workflow_dispatch: # 必须保留，供外部触发

permissions:
  contents: write

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 升级到 v4

      - name: 安装环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖库
        run: pip install requests beautifulsoup4 yfinance

      - name: 执行监控脚本
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python fda_monitor.py

      - name: 保存运行记录
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 确保这两个文件都能被追踪
          touch last_fda_ids.txt last_success_date_drug.txt
          git add last_fda_ids.txt last_success_date_drug.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新FDA记录及状态" && git push)
